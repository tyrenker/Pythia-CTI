title: Windows Defender Tampering via PowerShell or Cmd
id: c5d6e7f8-a9b0-c1d2-e3f4-a5b6c7d8e9f0
status: stable
description: Detects attempts to disable or tamper with Windows Defender/Antimalware, a common defense evasion step prior to ransomware deployment.
references:
    - https://attack.mitre.org/techniques/T1562/001/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_powershell:
        CommandLine|contains:
            - 'Set-MpPreference -DisableRealtimeMonitoring'
            - 'Add-MpPreference -ExclusionPath'
            - 'Set-MpPreference -DisableIOAVProtection'
    selection_registry:
        CommandLine|contains:
            - 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender'
            - 'DisableAntiSpyware'
    selection_service:
        CommandLine|contains:
            - 'sc stop WinDefend'
            - 'net stop WinDefend'
    condition: 1 of selection_*
falsepositives:
    - Security testing by authorized red team
    - Specific endpoint management products
level: high
