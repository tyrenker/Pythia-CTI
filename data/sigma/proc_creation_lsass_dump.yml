title: LSASS Memory Dump via Common Tools
id: 5ef04e6a-8c58-4d04-b5f5-4ce6eb5c7c5f
status: stable
description: Detects credential dumping from LSASS memory using common tools like procdump, mimikatz, or comsvcs.dll.
references:
    - https://attack.mitre.org/techniques/T1003/001/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_procdump:
        Image|endswith: '\procdump.exe'
        CommandLine|contains: 'lsass'
    selection_comsvcs:
        CommandLine|contains|all:
            - 'comsvcs.dll'
            - 'MiniDump'
    selection_mimikatz:
        CommandLine|contains:
            - 'sekurlsa::logonpasswords'
            - 'lsadump::sam'
            - 'privilege::debug'
    condition: 1 of selection_*
falsepositives:
    - Authorized memory analysis by incident responders
    - Legitimate crash dump tools
level: critical
