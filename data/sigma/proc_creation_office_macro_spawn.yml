title: Office Application Spawning Suspicious Child Process
id: d2e3f4a5-b6c7-d8e9-f0a1-b2c3d4e5f6a7
status: stable
description: Detects Office applications (Word, Excel, Outlook) spawning suspicious child processes, a strong indicator of malicious macro execution or phishing delivery.
references:
    - https://attack.mitre.org/techniques/T1566/001/
    - https://attack.mitre.org/techniques/T1204/002/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.initial_access
    - attack.execution
    - attack.t1566.001
    - attack.t1204.002
logsource:
    category: process_creation
    product: windows
detection:
    selection_parent:
        ParentImage|endswith:
            - '\WINWORD.EXE'
            - '\EXCEL.EXE'
            - '\OUTLOOK.EXE'
            - '\POWERPNT.EXE'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
            - '\regsvr32.exe'
            - '\rundll32.exe'
    condition: selection_parent and selection_child
falsepositives:
    - Legitimate macro-enabled Office automation
    - Some PDF conversion tools invoke Office processes
level: high
