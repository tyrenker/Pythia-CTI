title: PowerShell Suspicious Argument Combinations
id: 56d87d10-e1a1-4b56-b5f0-c5e7e32fe0b0
status: stable
description: Detects PowerShell invocations with argument combinations commonly used in malicious scripts — encoded commands, bypass flags, hidden window, and download cradles.
references:
    - https://attack.mitre.org/techniques/T1059/001/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_base:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_args:
        CommandLine|contains:
            - '-EncodedCommand'
            - '-enc '
            - '-ExecutionPolicy Bypass'
            - '-ep bypass'
            - '-nop '
            - '-NonInteractive'
            - 'IEX('
            - 'Invoke-Expression'
            - 'DownloadString'
            - 'WebClient'
            - '-WindowStyle Hidden'
            - '-w hidden'
    condition: selection_base and selection_args
falsepositives:
    - Legitimate admin scripts using encoded commands
    - Software deployment tools
level: high
