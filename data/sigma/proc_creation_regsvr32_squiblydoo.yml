title: Regsvr32 Squiblydoo (Script via COM)
id: b0c1d2e3-f4a5-b6c7-d8e9-f0a1b2c3d4e5
status: stable
description: Detects the Squiblydoo technique using regsvr32.exe to execute scripts via COM objects, bypassing application whitelisting.
references:
    - https://attack.mitre.org/techniques/T1218/010/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.defense_evasion
    - attack.t1218.010
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\regsvr32.exe'
        CommandLine|contains:
            - '/s'
            - '/u'
            - 'scrobj.dll'
    selection_remote:
        CommandLine|contains:
            - 'http://'
            - 'https://'
            - 'ftp://'
    condition: selection or (selection and selection_remote)
falsepositives:
    - Legitimate COM DLL registration
level: high
