title: Rundll32 Suspicious Execution
id: e1a2b3c4-d5e6-f7a8-b9c0-d1e2f3a4b5c6
status: stable
description: Detects suspicious rundll32.exe invocations used for defense evasion and execution via DLL side-loading or COM hijacking.
references:
    - https://attack.mitre.org/techniques/T1218/011/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.defense_evasion
    - attack.t1218.011
logsource:
    category: process_creation
    product: windows
detection:
    selection_no_args:
        Image|endswith: '\rundll32.exe'
        CommandLine|endswith: 'rundll32.exe'
    selection_suspicious:
        Image|endswith: '\rundll32.exe'
        CommandLine|contains:
            - 'javascript:'
            - 'vbscript:'
            - 'shell32.dll,ShellExec_RunDLL'
            - 'pcwutl.dll,LaunchApplication'
            - 'url.dll,OpenURL'
    condition: 1 of selection_*
falsepositives:
    - Legitimate application DLL loading
level: medium
