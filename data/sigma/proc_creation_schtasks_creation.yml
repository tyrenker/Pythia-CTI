title: Scheduled Task Creation via Schtasks
id: 92491082-3a7a-4c8a-9b5d-0e3e2a8c8a2f
status: stable
description: Detects scheduled task creation using schtasks.exe, a technique commonly used for persistence by threat actors.
references:
    - https://attack.mitre.org/techniques/T1053/005/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.persistence
    - attack.privilege_escalation
    - attack.t1053.005
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\schtasks.exe'
        CommandLine|contains: '/Create'
    filter_legitimate:
        CommandLine|contains:
            - 'Microsoft\Windows'
            - 'MicrosoftEdge'
            - 'GoogleUpdate'
    condition: selection and not filter_legitimate
falsepositives:
    - Legitimate software installation
    - System administration scripts
level: medium
