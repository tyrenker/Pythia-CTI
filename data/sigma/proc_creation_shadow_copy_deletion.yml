title: Shadow Copy Deletion (Pre-Ransomware)
id: d6e7f8a9-b0c1-d2e3-f4a5-b6c7d8e9f0a1
status: stable
description: Detects deletion of volume shadow copies via vssadmin, wmic, or PowerShell — a nearly universal pre-ransomware step to prevent file recovery.
references:
    - https://attack.mitre.org/techniques/T1490/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.impact
    - attack.t1490
logsource:
    category: process_creation
    product: windows
detection:
    selection_vssadmin:
        Image|endswith: '\vssadmin.exe'
        CommandLine|contains:
            - 'delete shadows'
            - 'resize shadowstorage'
    selection_wmic:
        Image|endswith: '\wmic.exe'
        CommandLine|contains:
            - 'shadowcopy delete'
            - 'shadowcopy where'
    selection_powershell:
        CommandLine|contains:
            - 'Get-WmiObject Win32_ShadowCopy'
            - 'Win32_ShadowCopy).Delete()'
    condition: 1 of selection_*
falsepositives:
    - Legitimate backup management software
level: critical
