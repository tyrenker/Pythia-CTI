title: System Information Discovery via Built-in Tools
id: f8a9b0c1-d2e3-f4a5-b6c7-d8e9f0a1b2c3
status: stable
description: Detects systematic use of built-in Windows tools for host reconnaissance — a common step in the post-exploitation discovery phase.
references:
    - https://attack.mitre.org/techniques/T1082/
    - https://attack.mitre.org/techniques/T1016/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.discovery
    - attack.t1082
    - attack.t1016
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\systeminfo.exe'
            - '\ipconfig.exe'
            - '\net.exe'
            - '\nltest.exe'
            - '\arp.exe'
            - '\route.exe'
        CommandLine|contains:
            - 'systeminfo'
            - '/all'
            - 'ipconfig'
            - 'net view'
            - 'net user'
            - 'net group'
            - 'nltest /domain_trusts'
    timeframe: 5m
    condition: selection | count() > 5
falsepositives:
    - System auditing scripts
    - Network monitoring agents
level: low
