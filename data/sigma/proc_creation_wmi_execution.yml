title: WMI Suspicious Execution
id: f2b3c4d5-e6f7-a8b9-c0d1-e2f3a4b5c6d7
status: stable
description: Detects suspicious WMI (Windows Management Instrumentation) usage for remote execution, a common lateral movement and execution technique.
references:
    - https://attack.mitre.org/techniques/T1047/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.execution
    - attack.lateral_movement
    - attack.t1047
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\wmic.exe'
            - '\wbemcons.exe'
        CommandLine|contains:
            - 'process call create'
            - '/node:'
            - 'shadowcopy'
    condition: selection
falsepositives:
    - Legitimate WMI administration
    - SCCM and patch management tools
level: high
