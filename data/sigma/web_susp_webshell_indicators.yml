title: Webshell Indicators in Web Server Process
id: e7f8a9b0-c1d2-e3f4-a5b6-c7d8e9f0a1b2
status: stable
description: Detects webshell activity by identifying child processes spawned by common web server processes (IIS, Apache, Tomcat), a sign of initial access via exploitation.
references:
    - https://attack.mitre.org/techniques/T1190/
    - https://attack.mitre.org/techniques/T1505/003/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.initial_access
    - attack.persistence
    - attack.t1190
    - attack.t1505.003
logsource:
    category: process_creation
    product: windows
detection:
    selection_parent:
        ParentImage|endswith:
            - '\w3wp.exe'
            - '\httpd.exe'
            - '\nginx.exe'
            - '\tomcat.exe'
            - '\java.exe'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\whoami.exe'
            - '\net.exe'
            - '\wscript.exe'
            - '\cscript.exe'
    condition: selection_parent and selection_child
falsepositives:
    - Legitimate web application management scripts
    - Some Java-based web servers spawn child processes legitimately
level: critical
