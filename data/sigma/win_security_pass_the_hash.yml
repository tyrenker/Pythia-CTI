title: Pass-the-Hash Authentication Anomaly
id: c1d2e3f4-a5b6-c7d8-e9f0-a1b2c3d4e5f6
status: stable
description: Detects pass-the-hash attacks via Windows event 4624 type 3 logons with a null or anonymous user name, which is characteristic of NTLM hash reuse.
references:
    - https://attack.mitre.org/techniques/T1550/002/
author: Pythia Curated (adapted from SigmaHQ)
date: 2024-01-01
tags:
    - attack.lateral_movement
    - attack.t1550.002
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4624
        LogonType: 3
        AuthenticationPackageName: NTLM
    filter_anonymous:
        SubjectUserName: 'ANONYMOUS LOGON'
    filter_null:
        SubjectUserSid: 'S-1-5-7'
    condition: selection and not (filter_anonymous or filter_null)
falsepositives:
    - Legitimate NTLM network authentication in environments without Kerberos
level: medium
