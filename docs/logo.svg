<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <!-- Background -->
  <rect width="800" height="180" rx="12" fill="#13131f"/>
  <rect x="0.5" y="0.5" width="799" height="179" rx="11.5" fill="none" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Subtle glow behind text -->
  <ellipse cx="400" cy="85" rx="220" ry="50" fill="#7c3aed" opacity="0.06"/>

  <!-- Hexagon icon -->
  <polygon
    points="44,72 56,52 80,52 92,72 80,92 56,92"
    fill="none"
    stroke="#7c3aed"
    stroke-width="2.5"
    stroke-linejoin="round"
  />
  <polygon
    points="44,72 56,52 80,52 92,72 80,92 56,92"
    fill="#7c3aed"
    opacity="0.12"
  />

  <!-- PYTHIA wordmark -->
  <text
    x="400"
    y="92"
    font-family="'Courier New', Courier, monospace"
