  <!-- Accent underline -->
  <line x1="260" y1="122" x2="540" y2="122" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Subtitle -->
  <text
    x="400"
    y="150"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#6b6b8a"
