site_name: Pythia
site_description: Oracle-grade threat intelligence, served as an API.
site_author: Ty Renker
site_url: https://tyrenker.github.io/pythia/
repo_url: https://github.com/tyrenker/pythia
repo_name: tyrenker/pythia

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Threat Hunt Workbench: hunt-workbench.md
  - API Reference: api.md
  - Frameworks: frameworks.md
  - External Intel Sources: external-intel.md
  - Demo Script: demo.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - tables
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tyrenker/pythia
