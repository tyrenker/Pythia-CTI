<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: A4;
    margin: 20mm 18mm 25mm 18mm;
    @bottom-center {
      content: "PYTHIA THREAT INTELLIGENCE  |  {{ tlp_label }}  |  Page " counter(page) " of " counter(pages);
      font-size: 8pt;
      color: #888;
      font-family: 'Courier New', monospace;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10pt;
    color: #1a1a2e;
    line-height: 1.5;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 3px solid #e94560;
    padding-bottom: 10px;
    margin-bottom: 20px;
  }

  .logo {
    font-size: 24pt;
    font-weight: 900;
    letter-spacing: 4px;
    color: #e94560;
  }

  .logo-sub {
    font-size: 8pt;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
  }

  .header-meta {
    text-align: right;
    font-size: 8pt;
    color: #888;
  }

  .tlp-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 3px;
    font-weight: bold;
    font-size: 9pt;
    letter-spacing: 1px;
  }

  .tlp-WHITE  { background: #f0f0f0; color: #333; }
  .tlp-GREEN  { background: #27ae60; color: #fff; }
  .tlp-AMBER  { background: #e67e22; color: #fff; }
  .tlp-RED    { background: #e94560; color: #fff; }

  h1 { font-size: 16pt; color: #1a1a2e; margin-bottom: 4px; }
  h2 { font-size: 12pt; color: #e94560; margin-top: 18px; margin-bottom: 8px;
       border-bottom: 1px solid #eee; padding-bottom: 4px; }
  h3 { font-size: 10pt; color: #1a1a2e; margin-top: 12px; margin-bottom: 4px; }

  .section { margin-bottom: 16px; }

  .summary-box {
    background: #f8f9fa;
    border-left: 4px solid #e94560;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 10pt;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 9pt;
  }

  th {
    background: #1a1a2e;
    color: #fff;
    padding: 5px 8px;
    text-align: left;
    font-weight: 600;
  }

  td {
    padding: 4px 8px;
    border-bottom: 1px solid #eee;
    vertical-align: top;
  }

  tr:nth-child(even) td { background: #f8f9fa; }

  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 8pt;
    font-weight: bold;
    margin-right: 2px;
  }

  .badge-critical { background: #e94560; color: #fff; }
  .badge-high     { background: #e67e22; color: #fff; }
  .badge-medium   { background: #f39c12; color: #fff; }
  .badge-low      { background: #27ae60; color: #fff; }
  .badge-info     { background: #3498db; color: #fff; }
  .badge-tactic   { background: #1a1a2e; color: #fff; }
  .badge-tech     { background: #e94560; color: #fff; }

  .kc-grid {
    display: table;
    width: 100%;
    border-collapse: separate;
    border-spacing: 4px;
    margin: 8px 0;
  }

  .kc-phase {
    display: table-cell;
    background: #f0f0f0;
    border-top: 3px solid #ccc;
    padding: 6px;
    text-align: center;
    font-size: 7.5pt;
    font-weight: bold;
    vertical-align: top;
    width: 14.28%;
  }

  .kc-phase.active { border-top-color: #e94560; background: #fff0f2; }

  .kc-phase-name { color: #888; margin-bottom: 4px; }
  .kc-count { font-size: 16pt; color: #e94560; font-weight: 900; }

  .no-data { color: #aaa; font-style: italic; font-size: 9pt; }

  .two-col { display: flex; gap: 16px; }
  .two-col > div { flex: 1; }

  code {
    font-family: 'Courier New', monospace;
    font-size: 8pt;
    background: #f0f0f0;
    padding: 1px 4px;
    border-radius: 2px;
  }

  pre {
    font-family: 'Courier New', monospace;
    font-size: 7pt;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 10px;
    border-radius: 4px;
    white-space: pre-wrap;
    word-break: break-all;
    overflow: hidden;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">PYTHIA</div>
    <div class="logo-sub">Threat Intelligence Platform</div>
  </div>
  <div class="header-meta">
    <span class="tlp-badge tlp-{{ tlp }}">TLP:{{ tlp }}</span><br><br>
    <strong>{{ report_type }}</strong><br>
    Generated: {{ generated_date }}<br>
    {% if pub_date %}Published: {{ pub_date }}<br>{% endif %}
    Report ID: <code>{{ report_id[:8] }}</code>
  </div>
</div>

{% block content %}{% endblock %}
</body>
</html>
